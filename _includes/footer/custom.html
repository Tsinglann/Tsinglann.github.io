<!-- Floating action buttons (mobile only) -->
<div id="mobile-fab-group">
  <button id="fab-theme-btn" class="mobile-fab" aria-label="Toggle theme">
    <i id="fab-theme-icon" class="fa-solid fa-sun" aria-hidden="true"></i>
  </button>
</div>

<!-- FAB: move to body root (escapes footer backdrop-filter stacking context)
     + keep theme icon in sync with data-theme attribute -->
<script>
(function(){
  function syncThemeIcon() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    var icon = document.getElementById('fab-theme-icon');
    if (icon) icon.className = isDark ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
  }

  function setup() {
    // Move FAB group to body so position:fixed works correctly
    var fabGroup = document.getElementById('mobile-fab-group');
    if (fabGroup) document.body.appendChild(fabGroup);

    // FAB theme button (self-contained — does not rely on module-scoped toggleTheme)
    var fabTheme = document.getElementById('fab-theme-btn');
    if (fabTheme) {
      fabTheme.addEventListener('click', function(){
        var current = document.documentElement.getAttribute('data-theme');
        var next = (current === 'dark') ? 'light' : 'dark';
        localStorage.setItem('theme', next);
        if (next === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.removeAttribute('data-theme');
        }
        // sync navbar icon
        var ni = document.getElementById('theme-icon');
        if (ni) ni.className = (next === 'dark') ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
      });
    }

    // Sync theme icon now and on every theme change
    syncThemeIcon();
    new MutationObserver(function(mutations){
      for (var i = 0; i < mutations.length; i++) {
        if (mutations[i].attributeName === 'data-theme') syncThemeIcon();
      }
    }).observe(document.documentElement, { attributes: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setup);
  } else {
    setup();
  }
})();
</script>

<!-- MathJax: only load if page contains math -->
<script>
(function(){
  var body = document.body.innerHTML;
  if (/\$\$|\\[\(\[]/.test(body)) {
    var s = document.createElement('script');
    s.id = 'MathJax-script';
    s.src = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js';
    s.defer = true;
    document.head.appendChild(s);
  }
})();
</script>

<!-- Mermaid: only load if page contains mermaid code blocks -->
<script>
(function(){
  if (document.querySelector('code.language-mermaid')) {
    import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs').then(function(m){
      m.default.initialize({startOnLoad:true, theme:'default'});
      m.default.run({querySelector:'code.language-mermaid'});
    });
  }
})();
</script>
