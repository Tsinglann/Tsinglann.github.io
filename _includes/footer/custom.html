<!-- Language toggle script -->
<script>
(function(){
  var html = document.documentElement;
  var lang = localStorage.getItem('site-lang') || 'zh';

  function applyLang(l) {
    html.setAttribute('data-lang', l);
    localStorage.setItem('site-lang', l);
    var btn = document.getElementById('lang-toggle-btn');
    if (btn) btn.textContent = l === 'zh' ? 'EN' : '中';
    // Update nav link text to match language
    document.querySelectorAll('.greedy-nav a[data-zh]').forEach(function(a){
      a.textContent = l === 'zh' ? a.getAttribute('data-zh') : a.getAttribute('data-en');
    });
  }

  applyLang(lang);

  document.addEventListener('DOMContentLoaded', function(){
    var btn = document.getElementById('lang-toggle-btn');
    if (btn) {
      btn.addEventListener('click', function(e){
        e.preventDefault();
        lang = lang === 'zh' ? 'en' : 'zh';
        applyLang(lang);
      });
    }
  });
})();
</script>
