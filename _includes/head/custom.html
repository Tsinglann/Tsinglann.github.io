{% include base_path %}

<!-- start custom head snippets -->

<!-- Language toggle: apply saved preference early to avoid flash -->
<script>
  (function(){
    var l = localStorage.getItem('site-lang') || 'zh';
    document.documentElement.setAttribute('data-lang', l);
  })();
</script>
<style>
  html[data-lang="en"] .lang-zh { display: none !important; }
  html[data-lang="zh"] .lang-en { display: none !important; }
</style>

<!-- On mobile: move all hidden-links back to visible-links after greedy nav runs -->
<script>
  document.addEventListener('DOMContentLoaded', function(){
    if (window.innerWidth < 925) {
      var visible = document.querySelector('.greedy-nav .visible-links');
      var hidden  = document.querySelector('.greedy-nav .hidden-links');
      if (visible && hidden) {
        while (hidden.firstChild) visible.appendChild(hidden.firstChild);
      }
    }
  });
</script>

<!-- MathJax config: enable $...$ inline math -->
<script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    }
  };
</script>

<!-- Custom anime-academic theme -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/anime-academic.css">

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- end custom head snippets -->
